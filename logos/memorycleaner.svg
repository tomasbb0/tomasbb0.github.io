<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#0d1117"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#34d399"/>
      <stop offset="100%" style="stop-color:#10b981"/>
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a78bfa"/>
      <stop offset="100%" style="stop-color:#8b5cf6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Memory chip outline -->
  <rect x="156" y="116" width="200" height="240" rx="16" fill="none" stroke="url(#green)" stroke-width="6"/>
  <!-- Chip pins left -->
  <line x1="132" y1="160" x2="156" y2="160" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="196" x2="156" y2="196" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="232" x2="156" y2="232" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="268" x2="156" y2="268" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="132" y1="304" x2="156" y2="304" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <!-- Chip pins right -->
  <line x1="356" y1="160" x2="380" y2="160" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="356" y1="196" x2="380" y2="196" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="356" y1="232" x2="380" y2="232" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="356" y1="268" x2="380" y2="268" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <line x1="356" y1="304" x2="380" y2="304" stroke="url(#green)" stroke-width="5" stroke-linecap="round"/>
  <!-- Inner circuit pattern -->
  <rect x="186" y="150" width="60" height="40" rx="6" fill="url(#green)" opacity="0.3"/>
  <rect x="266" y="150" width="60" height="40" rx="6" fill="url(#green)" opacity="0.2"/>
  <rect x="186" y="206" width="60" height="40" rx="6" fill="url(#green)" opacity="0.2"/>
  <rect x="266" y="206" width="60" height="40" rx="6" fill="url(#green)" opacity="0.3"/>
  <!-- Sparkle / clean symbol -->
  <g transform="translate(256, 296)">
    <path d="M0,-20 L4,-4 L20,0 L4,4 L0,20 L-4,4 L-20,0 L-4,-4 Z" fill="url(#purple)" opacity="0.9"/>
  </g>
  <!-- Broom sweep lines -->
  <line x1="230" y1="310" x2="210" y2="330" stroke="url(#purple)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="256" y1="316" x2="256" y2="340" stroke="url(#purple)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <line x1="282" y1="310" x2="302" y2="330" stroke="url(#purple)" stroke-width="3" stroke-linecap="round" opacity="0.5"/>
  <!-- Text -->
  <text x="256" y="416" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" fill="#ffffff" letter-spacing="-1">Memory</text>
  <text x="256" y="462" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="700" font-size="42" fill="url(#green)" letter-spacing="-1">Cleaner</text>
</svg>
