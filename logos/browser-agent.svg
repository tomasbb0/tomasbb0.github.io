<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c0c1d"/>
      <stop offset="100%" style="stop-color:#1a1a3e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Browser window frame -->
  <rect x="106" y="100" width="300" height="220" rx="16" fill="none" stroke="url(#blue)" stroke-width="5"/>
  <!-- Title bar -->
  <line x1="106" y1="136" x2="406" y2="136" stroke="url(#blue)" stroke-width="3" opacity="0.5"/>
  <!-- Traffic lights -->
  <circle cx="132" cy="118" r="7" fill="#ef4444" opacity="0.8"/>
  <circle cx="154" cy="118" r="7" fill="#eab308" opacity="0.8"/>
  <circle cx="176" cy="118" r="7" fill="#22c55e" opacity="0.8"/>
  <!-- URL bar -->
  <rect x="200" y="110" width="180" height="16" rx="8" fill="url(#blue)" opacity="0.15"/>
  <!-- Cursor / agent pointer -->
  <g transform="translate(300, 220)">
    <path d="M0,0 L0,40 L12,32 L20,48 L28,44 L20,28 L34,28 Z" fill="url(#orange)" stroke="#ffffff" stroke-width="2"/>
  </g>
  <!-- AI sparkles around cursor -->
  <g transform="translate(340, 210) scale(0.7)">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z" fill="url(#orange)" opacity="0.7"/>
  </g>
  <g transform="translate(360, 240) scale(0.5)">
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z" fill="url(#orange)" opacity="0.5"/>
  </g>
  <!-- Content lines in browser -->
  <rect x="130" y="156" width="120" height="8" rx="4" fill="url(#blue)" opacity="0.2"/>
  <rect x="130" y="176" width="180" height="8" rx="4" fill="url(#blue)" opacity="0.15"/>
  <rect x="130" y="196" width="90" height="8" rx="4" fill="url(#blue)" opacity="0.2"/>
  <rect x="130" y="240" width="140" height="24" rx="6" fill="url(#orange)" opacity="0.3"/>
  <rect x="130" y="280" width="100" height="8" rx="4" fill="url(#blue)" opacity="0.12"/>
  <!-- Text -->
  <text x="256" y="390" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="#ffffff" letter-spacing="-1">Browser</text>
  <text x="256" y="448" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="52" fill="url(#orange)" letter-spacing="-1">Agent</text>
</svg>
