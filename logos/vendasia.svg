<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d2ff"/>
      <stop offset="100%" style="stop-color:#3a7bd5"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Robot head outline -->
  <rect x="156" y="140" width="200" height="180" rx="24" fill="none" stroke="url(#accent)" stroke-width="8"/>
  <!-- Antenna -->
  <line x1="256" y1="140" x2="256" y2="100" stroke="url(#accent)" stroke-width="6" stroke-linecap="round"/>
  <circle cx="256" cy="92" r="12" fill="url(#accent)"/>
  <!-- Eyes -->
  <circle cx="210" cy="210" r="20" fill="url(#accent)" opacity="0.9"/>
  <circle cx="302" cy="210" r="20" fill="url(#accent)" opacity="0.9"/>
  <!-- Inner eye glow -->
  <circle cx="216" cy="204" r="6" fill="#ffffff" opacity="0.8"/>
  <circle cx="308" cy="204" r="6" fill="#ffffff" opacity="0.8"/>
  <!-- Mouth / signal bars -->
  <rect x="210" y="264" width="16" height="24" rx="3" fill="url(#accent)" opacity="0.6"/>
  <rect x="234" y="256" width="16" height="32" rx="3" fill="url(#accent)" opacity="0.7"/>
  <rect x="258" y="248" width="16" height="40" rx="3" fill="url(#accent)" opacity="0.8"/>
  <rect x="282" y="240" width="16" height="48" rx="3" fill="url(#accent)" opacity="0.9"/>
  <!-- Ear pieces -->
  <rect x="132" y="190" width="24" height="48" rx="12" fill="url(#accent)" opacity="0.7"/>
  <rect x="356" y="190" width="24" height="48" rx="12" fill="url(#accent)" opacity="0.7"/>
  <!-- Text -->
  <text x="256" y="400" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="56" fill="#ffffff" letter-spacing="-1">Vendas</text>
  <text x="256" y="452" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="44" fill="url(#accent)" letter-spacing="2">IA</text>
</svg>
